<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>产业合作区 - 简化版</title>
<style>
body{font-family:Arial,sans-serif;background:#0d1117;color:#c9d1d9;margin:0;padding:0}
.header{background:#161b22;padding:16px;border-bottom:1px solid #30363d}
.header h1{font-size:18px;color:#58a6ff;margin:0}
.tab-bar{display:flex;gap:8px;padding:16px;background:#161b22;border-bottom:1px solid #30363d}
.tab-btn{padding:8px 16px;background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:6px;cursor:pointer}
.tab-btn:hover{background:#30363d}
.tab-btn.active{background:#238636;color:#fff}
.content{padding:24px}
.tab-content{display:none}
.tab-content.active{display:block}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.card h3{color:#58a6ff;margin:0 0 12px 0;font-size:14px}
.card p{color:#8b949e;margin:0;line-height:1.6}
</style>
</head>
<body>
<div class="header">
  <h1>长三角（湖州）产业合作区</h1>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('location')">区位优势</button>
  <button class="tab-btn" onclick="showTab('chain')">产业链</button>
  <button class="tab-btn" onclick="showTab('filter')">筛选</button>
  <button class="tab-btn" onclick="showTab('enterprise')">企业</button>
  <button class="tab-btn" onclick="showTab('factory')">厂房</button>
</div>
<div class="content">
  <div id="tab-location" class="tab-content active">
    <div class="card"><h3>区位优势</h3><p>长三角中心，86.9平方公里核心区</p></div>
  </div>
  <div id="tab-chain" class="tab-content">
    <div class="card"><h3>产业链全景</h3><p>28个产业分类，420+企业数据</p></div>
  </div>
  <div id="tab-filter" class="tab-content">
    <div class="card"><h3>智能筛选</h3><p>基于融资扩产动态智能匹配</p></div>
  </div>
  <div id="tab-enterprise" class="tab-content">
    <div class="card"><h3>全区企业</h3><p>286家企业数据</p></div>
  </div>
  <div id="tab-factory" class="tab-content">
    <div class="card"><h3>空余厂房</h3><p>52条厂房信息</p></div>
  </div>
</div>
<script>
function showTab(id){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active')});
  document.querySelector('[onclick*="showTab(\''+id+'\')"]').classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}
</script>
</body>
</html>
