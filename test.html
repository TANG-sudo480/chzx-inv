<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<button onclick="showTab('test1', this)">Test1</button>
<button onclick="showTab('test2', this)">Test2</button>
<div id="tab-test1" style="display:none">Tab1 Content</div>
<div id="tab-test2" style="display:none">Tab2 Content</div>
<script>
function showTab(id, btn){
  document.querySelectorAll("button").forEach(b=>b.style.background='');
  document.querySelectorAll("div[id^='tab-']").forEach(c=>c.style.display='none');
  btn.style.background='yellow';
  document.getElementById("tab-"+id).style.display='block';
}
</script>
</body>
</html>
