<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Tab Test</title>
<style>
body{font-family:Arial;padding:20px;background:#0d1117;color:#c9d1d9}
.tab-btn{padding:10px 20px;margin:5px;background:#161b22;border:1px solid #30363d;color:#c9d1d9;cursor:pointer;border-radius:6px}
.tab-btn.active{background:#238636;border-color:#238636}
.tab-content{display:none;padding:20px;background:#161b22;border-radius:8px;margin-top:10px}
.tab-content.active{display:block}
</style>
</head>
<body>
<h2>Tab 测试</h2>
<div>
  <button class="tab-btn active" onclick="showTab('tab1', this)">Tab 1</button>
  <button class="tab-btn" onclick="showTab('tab2', this)">Tab 2</button>
  <button class="tab-btn" onclick="showTab('tab3', this)">Tab 3</button>
</div>
<div id="tab-tab1" class="tab-content active">这是 Tab 1 的内容</div>
<div id="tab-tab2" class="tab-content">这是 Tab 2 的内容</div>
<div id="tab-tab3" class="tab-content">这是 Tab 3 的内容</div>
<script>
function showTab(id, btn){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}
</script>
</body>
</html>
