<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>产业合作区 - 测试版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0d1117;color:#c9d1d9}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px}
.header h1{font-size:18px;color:#58a6ff}
.tab-bar{display:flex;gap:8px;padding:16px 24px;background:#161b22;border-bottom:1px solid #30363d;flex-wrap:wrap}
.tab-btn{padding:8px 16px;background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:6px;cursor:pointer;font-size:13px}
.tab-btn:hover{background:#30363d;color:#c9d1d9}
.tab-btn.active{background:#238636;border-color:#238636;color:#fff}
.content{max-width:1200px;margin:0 auto;padding:24px}
.tab-content{display:none}
.tab-content.active{display:block}
.info-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:20px;margin-bottom:16px}
.info-card h3{color:#58a6ff;margin-bottom:12px;font-size:14px}
.info-card p{color:#8b949e;line-height:1.8;font-size:13px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-top:16px}
.stat-box{background:#21262d;padding:16px;border-radius:6px;text-align:center}
.stat-box .num{font-size:24px;font-weight:bold;color:#3fb950}
.stat-box .label{font-size:11px;color:#8b949e;margin-top:4px}
</style>
</head>
<body>
<div class="header">
  <h1>长三角（湖州）产业合作区 - 新能源汽车产业链</h1>
</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('location')">区位优势</button>
  <button class="tab-btn" onclick="showTab('chain')">产业链全景</button>
  <button class="tab-btn" onclick="showTab('filter')">智能筛选</button>
  <button class="tab-btn" onclick="showTab('enterprise')">全区企业</button>
  <button class="tab-btn" onclick="showTab('factory')">空余厂房</button>
  <button class="tab-btn" onclick="showTab('analyze')">项目研判</button>
</div>
<div class="content">
  <div id="tab-location" class="tab-content active">
    <div class="info-card">
      <h3>战略定位</h3>
      <p>长三角（湖州）产业合作区是长三角一体化国家战略的载体，是长三角一地六县第一个以"长三角"冠名的产业合作区。</p>
      <div class="stat-grid">
        <div class="stat-box"><div class="num">86.9k㎡</div><div class="label">核心区面积</div></div>
        <div class="stat-box"><div class="num">194家</div><div class="label">规上企业</div></div>
        <div class="stat-box"><div class="num">530亿</div><div class="label">工业产值</div></div>
        <div class="stat-box"><div class="num">75万㎡</div><div class="label">厂房面积</div></div>
      </div>
    </div>
  </div>
  <div id="tab-chain" class="tab-content">
    <div class="info-card">
      <h3>产业链全景</h3>
      <p>新能源汽车产业链覆盖电池系统、电驱电机、智能驾驶、底盘传动等28个产业环节。</p>
    </div>
  </div>
  <div id="tab-filter" class="tab-content">
    <div class="info-card">
      <h3>智能筛选</h3>
      <p>基于企业融资、扩产动态进行智能匹配推荐。</p>
    </div>
  </div>
  <div id="tab-enterprise" class="tab-content">
    <div class="info-card">
      <h3>全区企业</h3>
      <p>长合区全区企业名单，共286家企业数据。</p>
    </div>
  </div>
  <div id="tab-factory" class="tab-content">
    <div class="info-card">
      <h3>空余厂房</h3>
      <p>天子湖镇18家 + 泗安镇12家空余厂房信息。</p>
    </div>
  </div>
  <div id="tab-analyze" class="tab-content">
    <div class="info-card">
      <h3>项目研判</h3>
      <p>AI辅助项目评估与产业匹配工具。</p>
    </div>
  </div>
</div>
<script>
function showTab(id){
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('[onclick*="showTab(\''+id+'\')"]').classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}
console.log('Test page loaded');
</script>
</body>
</html>
